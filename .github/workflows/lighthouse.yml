name: Lighthouse CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - run: npm ci
        env:
          HUSKY: 0
      - run: npm run build
      - uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
      - name: Comment Lighthouse results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            try {
              const files = fs.readdirSync('.lighthouseci');
              const manifestFile = files.find(f => f.startsWith('manifest') && f.endsWith('.json'));
              if (!manifestFile) return;
              const manifest = JSON.parse(fs.readFileSync(`.lighthouseci/${manifestFile}`, 'utf8'));
              const result = manifest[manifest.length - 1];
              if (!result?.summary) return;
              const scores = result.summary;
              const fmt = (s) => { const p = Math.round(s * 100); return p >= 90 ? `🟢 ${p}` : p >= 50 ? `🟠 ${p}` : `🔴 ${p}`; };
              const comment = `## ⚡ Lighthouse Report\n\n| Category | Score |\n|----------|-------|\n| Performance | ${fmt(scores.performance)} |\n| Accessibility | ${fmt(scores.accessibility)} |\n| Best Practices | ${fmt(scores['best-practices'])} |\n| SEO | ${fmt(scores.seo)} |\n\n*Commit ${context.sha.substring(0,7)}*`;
              const { data: comments } = await github.rest.issues.listComments({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number });
              const existing = comments.find(c => c.user.type === 'Bot' && c.body.includes('⚡ Lighthouse Report'));
              if (existing) {
                await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body: comment });
              } else {
                await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body: comment });
              }
            } catch (e) { console.log('Error:', e.message); }
