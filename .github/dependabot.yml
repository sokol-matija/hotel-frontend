version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      tanstack:
        patterns:
          - "@tanstack/*"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@testing-library/*"
          - "@playwright/test"
      storybook:
        patterns:
          - "storybook"
          - "@storybook/*"
      semantic-release:
        patterns:
          - "semantic-release"
          - "@semantic-release/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
